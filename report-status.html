<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generating Insight Report | Elpis Literary House</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #fdfbf7;
            color: #1a1a2e;
            text-align: center;
            padding: 40px;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 50px;
            border: 2px solid #d4af37;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { color: #d4af37; font-size: 2.2em; margin-bottom: 20px; }
        
        /* Loading Animation */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { font-size: 4em; margin: 20px 0; animation: spin 2s infinite linear; display: inline-block; color: #d4af37; }
        .progress-container { width: 100%; background-color: #eee; border-radius: 10px; margin: 20px auto; max-width: 400px; height: 12px; overflow: hidden; border: 1px solid #ccc; }
        .progress-bar { width: 0%; height: 100%; background-color: #d4af37; transition: width 0.5s ease-in-out; }
        .message { font-size: 1.2em; color: #555; margin-top: 20px; min-height: 1.5em; }
        
        /* Buttons */
        .btn-action {
            margin-top: 30px;
            padding: 15px 40px;
            background-color: #d4af37;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 1.2em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
        }
        .btn-action:hover { background-color: #1a1a2e; color: #d4af37; }

        /* ✅ REPORT PREVIEW STYLES (Hidden until generated) */
        #reportPreview {
            display: none;
            text-align: left;
            margin-top: 40px;
            border-top: 2px solid #d4af37;
            padding-top: 30px;
        }
        .report-section { margin-bottom: 30px; }
        .report-section h3 { color: #d4af37; border-left: 4px solid #d4af37; padding-left: 10px; }
        .report-content { white-space: pre-wrap; background: #f9f9f9; padding: 20px; border-radius: 5px; font-family: 'Arial', sans-serif; font-size: 0.95em; }

        /* ✅ PRINT STYLES */
        @media print {
            body { background: white; color: black; }
            .container { border: none; box-shadow: none; width: 100%; max-width: 100%; }
            .no-print { display: none !important; }
            #reportPreview { display: block !important; border: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="no-print">Elpis Insight Analysis</h1>
        
        <!-- LOADING SECTION -->
        <div class="status-box no-print" id="loadingSection">
            <div class="spinner">🌀</div>
            <h2 style="color: #1a1a2e;">Analyzing Your Manuscript...</h2>
            <p class="message" id="statusMessage">Connecting to AI Agents...</p>
            <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
            <p style="font-size: 0.9em; color: #888; margin-top: 10px;">Please do not close this tab. This process takes approximately 60 seconds.</p>
        </div>

        <!-- ✅ REPORT PREVIEW & DOWNLOAD SECTION -->
        <div id="reportPreview">
            <div id="reportContent"></div>
            <div class="no-print" style="text-align: center; margin-top: 40px;">
                <button onclick="window.print()" class="btn-action">🖨️ PRINT / SAVE AS PDF</button>
                <p style="margin-top: 15px; font-size: 0.9em; color: #666;">
                    <em>Your manuscript has been permanently deleted from our servers.</em>
                </p>
            </div>
        </div>

        <div class="nav-links no-print">
            <a href="index.html">Home</a> | <a href="insight.html">Back to Insight</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const manuscriptHash = urlParams.get('hash');
        const language = urlParams.get('lang') || 'English';

        if (!manuscriptHash) {
            document.body.innerHTML = "<div class='container'><h1>Error</h1><p>No manuscript found.</p></div>";
        } else {
            startRealAnalysis(manuscriptHash, language);
        }

        async function startRealAnalysis(hash, lang) {
            const progressBar = document.getElementById('progressBar');
            const statusMessage = document.getElementById('statusMessage');
            const loadingSection = document.getElementById('loadingSection');
            const reportPreview = document.getElementById('reportPreview');
            const reportContent = document.getElementById('reportContent');

            let width = 0;
            const interval = setInterval(() => { if (width < 90) { width += 5; progressBar.style.width = width + '%'; } }, 200);

            try {
                // 1. CALL GENERATE FUNCTION
                const response = await fetch('/.netlify/functions/generate-report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ manuscriptHash: hash, bookTitle: "Insight_Report", authorName: "Author", language: lang })
                });

                const result = await response.json();

                if (response.ok && result.ipfsHash) {
                    clearInterval(interval);
                    progressBar.style.width = '100%';
                    statusMessage.innerText = "Fetching Final Report...";
                    
                    // 2. FETCH THE GENERATED JSON REPORT FROM PINATA
                    const reportRes = await fetch(`https://gateway.pinata.cloud/ipfs/${result.ipfsHash}`);
                    const reportData = await reportRes.json();

                    // 3. RENDER BEAUTIFUL HTML
                    let html = `<h1 style="text-align:center; color:#d4af37;">${reportData.title}</h1>`;
                    html += `<p style="text-align:center;"><strong>Author:</strong> ${reportData.author} | <strong>Language:</strong> ${reportData.language}</p><hr>`;
                    
                    for (const [key, value] of Object.entries(reportData.reports)) {
                        html += `<div class="report-section"><h3>${key}</h3><div class="report-content">${value}</div></div>`;
                    }

                    reportContent.innerHTML = html;
                    
                    setTimeout(() => {
                        loadingSection.style.display = 'none';
                        reportPreview.style.display = 'block';
                    }, 1000);

                } else {
                    throw new Error(result.error || "Failed to generate report");
                }

            } catch (error) {
                clearInterval(interval);
                statusMessage.innerText = "Error: " + error.message;
                statusMessage.style.color = "red";
            }
        }
    </script>
</body>
</html>
