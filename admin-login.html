<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | Elpis</title>
    <style>
        body { font-family: 'Georgia', serif; background: #fdfbf7; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 40px; border: 2px solid #d4af37; border-radius: 10px; text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #1a1a2e; color: #d4af37; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        h2 { color: #1a1a2e; }
    </style>
    <!-- Netlify Identity Script -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <div class="login-box">
        <h2>Elpis Admin</h2>
        <p>Please log in to view financial reports.</p>
        <div data-netlify-identity-menu></div>
    </div>
    <script>
        // If already logged in, go to report
        if (window.netlifyIdentity && window.netlifyIdentity.currentUser()) {
            window.location.href = "admin-payouts.html";
        }
        // Listen for login success
        window.netlifyIdentity.on("login", function(user) {
            window.location.href = "admin-payouts.html";
        });
    </script>
</body>
</html>
