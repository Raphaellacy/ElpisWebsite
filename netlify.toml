[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions]
  node_bundler = "esbuild"

# ✅ ADD THIS SECTION FOR STRIPE WEBHOOK RAW BODY SUPPORT
[[functions.external_node_modules]]
  modules = ["stripe"]

# ✅ ENSURE STRIPE WEBHOOK GETS RAW BODY
[functions.stripe-webhook]
  included_files = ["netlify/functions/stripe-webhook.mjs"]