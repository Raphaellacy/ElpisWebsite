<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Payout Report | Elpis</title>
    <!-- Netlify Identity Script -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body { font-family: 'Georgia', serif; background-color: #fdfbf7; color: #1a1a2e; padding: 40px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 40px; border: 1px solid #d4af37; border-radius: 10px; }
        h1 { color: #d4af37; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #1a1a2e; color: #d4af37; }
        .total-box { margin-top: 20px; font-size: 1.2em; font-weight: bold; text-align: right; color: #d4af37; }
        .logout-btn { float: right; background: #d4af37; color: #1a1a2e; border: none; padding: 5px 10px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <button class="logout-btn" onclick="window.netlifyIdentity.logout()">Logout</button>
    <h1>Elpis Master Payout Report</h1>
    <p style="text-align:center;">Secure Financial Ledger</p>
    
    <table id="payoutTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Book Title</th>
                <th>Author Name</th>
                <th>Author Wallet</th>
                <th>Total Sale</th>
                <th>Payout Due (70%)</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="6" style="text-align:center;">Loading secure data...</td></tr>
        </tbody>
    </table>
    <div class="total-box" id="totalPayout"></div>
</div>

<script>
    // ✅ SECURITY GUARD: KICK OUT IF NOT LOGGED IN
    if (!window.netlifyIdentity || !window.netlifyIdentity.currentUser()) {
        window.location.href = "admin-login.html";
    }

    async function loadPayouts() {
        try {
            // We will fetch the sales records from Pinata via our get-books function
            const response = await fetch('/.netlify/functions/get-books');
            const data = await response.json();
            
            const tbody = document.querySelector('#payoutTable tbody');
            tbody.innerHTML = ''; // Clear loading message
            let totalDue = 0;

            // Filter for SALES_REPORT files
            const salesFiles = data.rows.filter(row => 
                row.metadata.name && row.metadata.name.includes('SALES_REPORT')
            );

            for (const row of salesFiles) {
                const fileRes = await fetch(`https://gateway.pinata.cloud/ipfs/${row.ipfs_pin_hash}`);
                const sale = await fileRes.json();
                
                const payout = parseFloat(sale.authorPayoutDue) || 0;
                totalDue += payout;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${new Date(sale.timestamp).toLocaleDateString()}</td>
                    <td>${sale.bookTitle}</td>
                    <td>${sale.authorName}</td>
                    <td style="font-family:monospace; font-size:0.9em;">${sale.authorWallet}</td>
                    <td>${sale.totalSale}</td>
                    <td style="color:green; font-weight:bold;">${sale.authorPayoutDue}</td>
                `;
                tbody.appendChild(tr);
            }

            document.getElementById('totalPayout').innerText = "Total Payout Due: €" + totalDue.toFixed(2);

        } catch (error) {
            console.error("Error loading report:", error);
            document.querySelector('#payoutTable tbody').innerHTML = '<tr><td colspan="6">Error loading data.</td></tr>';
        }
    }
    loadPayouts();
</script>
</body>
</html>
